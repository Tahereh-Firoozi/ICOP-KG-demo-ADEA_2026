services:
  - type: web
    name: icop-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false   
      - key: EMBEDDINGS_PKL_URL
        sync: false
      - key: EMBEDDINGS_PKL_URL_BEARER
        sync: false
      - key: EMBEDDINGS_PKL_SHA256
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
